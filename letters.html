<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>First Impressions</title>
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>

<body>
  <!-- Floating whitespace field -->
  <main id="impressionsField" class="float-field" aria-label="First impressions"></main>

  <!-- Modal -->
  <div id="backdrop" class="backdrop" style="display:none;" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button id="closeBtn" class="close" type="button" aria-label="Close">×</button>
      <h2 id="modalTitle"></h2>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="js/letters.js"></script>
</body>
</html>
