    "20260221_013025418_iOS.jpg",
    "20260221_013446092_iOS.jpg",
    "20260222_084321203_iOS.jpg"
  ];

  const spread = document.getElementById("spread");
  const countMeta = document.getElementById("countMeta");

  const variants = ["v1","v2","v3","v4","v5","v6","v7","v8"];
  const tilts = ["","t1","t2","t3","t4"];
  const prints = ["p1","p2","p3"];

  const lightbox = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbIndex = document.getElementById("lbIndex");
  const lbClose = document.getElementById("lbClose");

  countMeta.textContent = `${photos.length} prints`;

  function pad2(n){ return String(n).padStart(2,"0"); }

  photos.forEach((file, i) => {
    const num = i + 1;

    // CHANGED: photos are now in /assets (not /assets/photos)
    const src = `assets/${file}`;

    const fig = document.createElement("figure");
    fig.className = `shot ${variants[i % variants.length]} ${tilts[i % tilts.length]} ${prints[i % prints.length]}`;

    const frame = document.createElement("div");
    frame.className = "frame";

    const img = document.createElement("img");
    img.src = src;
    img.alt = `Photo ${num}`;

    frame.appendChild(img);

    const cap = document.createElement("figcaption");
    const left = document.createElement("span");
    left.className = "idx";
    left.textContent = `(${pad2(num)})`;
    cap.appendChild(left);

    fig.appendChild(frame);
    fig.appendChild(cap);

    fig.addEventListener("click", () => {
      lbImg.src = src;
      lbIndex.textContent = `(${pad2(num)})`;
      lightbox.style.display = "grid";
    });

    spread.appendChild(fig);
  });

  function closeLightbox(){
    lightbox.style.display = "none";
    lbImg.src = "";
  }

  lbClose.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && lightbox.style.display !== "none") closeLightbox();
  });
</script>
